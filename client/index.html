<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neuros</title>
    <link
      rel="shortcut icon"
      href="https://8ded8880.delivery.rocketcdn.me/themes/neuros/wp-content/uploads/2023/12/cropped-favicon-32x32.png"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="./node_modules/remixicon/fonts/remixicon.css"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <header class="container mx-auto px-[40px] max-w-[1440px]">
      <nav class="flex items-center justify-between">
        <div class="left">
          <div class="sideBarIcon"><i class="ri-layout-grid-fill"></i></div>
          <div class="logo">
            <img
              src="https://8ded8880.delivery.rocketcdn.me/themes/neuros/wp-content/uploads/2024/12/logo-mobile-1.png"
              alt=""
            />
          </div>
        </div>
        <div class="tabs">
          <ul class="flex items-center gap-[17px] uppercase font-monrope">
            <li
              class="py-[13px] bg-[#333] text-[#f5f5f5] font-bold leading-[40px] h-[40px] px-[22px] text-[14px] rounded-[999px] flex items-center justify-center"
            >
              Home
            </li>
            <li
              class="py-[13px] bg-[#F2F0F4] text-[#333] font-bold leading-[40px] h-[40px] px-[22px] text-[14px] rounded-[999px] flex items-center justify-center"
            >
              Pages
            </li>
            <li
              class="py-[13px] bg-[#F2F0F4] text-[#333] font-bold leading-[40px] h-[40px] px-[22px] text-[14px] rounded-[999px] flex items-center justify-center"
            >
              Services
            </li>
            <li
              class="py-[13px] bg-[#F2F0F4] text-[#333] font-bold leading-[40px] h-[40px] px-[22px] text-[14px] rounded-[999px] flex items-center justify-center"
            >
              Shop
            </li>
            <li
              class="py-[13px] bg-[#F2F0F4] text-[#333] font-bold leading-[40px] h-[40px] px-[22px] text-[14px] rounded-[999px] flex items-center justify-center"
            >
              blog
            </li>
            <li
              class="py-[13px] bg-[#F2F0F4] text-[#333] font-bold leading-[40px] h-[40px] px-[22px] text-[14px] rounded-[999px] flex items-center justify-center"
            >
              Contacts
            </li>
          </ul>
        </div>
        <div class="actions">
          <ul>
            <li><i class="ri-search-line"></i></li>
            <li>Get in touch</li>
          </ul>
        </div>
      </nav>
    </header>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
