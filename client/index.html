<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neuros</title>
    <link
      rel="shortcut icon"
      href="https://8ded8880.delivery.rocketcdn.me/themes/neuros/wp-content/uploads/2023/12/cropped-favicon-32x32.png"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="./node_modules/remixicon/fonts/remixicon.css"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <header
      class="mx-auto px-[40px] sticky top-0 left-[20px] right-[20px] pt-[10px] bg-[#F0F2F4]"
    >
      <nav
        class="flex items-center justify-between py-[15px] px-[20px] rounded-[25px] bg-white"
      >
        <div class="left flex items-center">
          <div class="sideBarIcon w-[70px]">
            <i class="ri-layout-grid-fill text-[25px]"></i>
          </div>
          <div class="logo w-[47px] h-auto">
            <img
              src="https://8ded8880.delivery.rocketcdn.me/themes/neuros/wp-content/uploads/2024/12/logo-mobile-1.png"
              alt=""
              class="w-full h-full object-contain"
            />
          </div>
        </div>
        <div class="tabs">
          <ul class="flex items-center gap-[17px] uppercase font-manrope">
            <li
              class="py-[13px] bg-[#333] cursor-pointer duration-300 text-[#f5f5f5] font-bold leading-[40px] h-[40px] px-[22px] text-[14px] rounded-[999px] flex items-center justify-center"
            >
              Home
            </li>
            <li
              class="py-[13px] hover:bg-[#F2F0F4] duration-300 cursor-pointer text-[#333] font-bold leading-[40px] h-[40px] px-[22px] text-[14px] rounded-[999px] flex items-center justify-center"
            >
              Pages
            </li>
            <li
              class="py-[13px] hover:bg-[#F2F0F4] duration-300 cursor-pointer text-[#333] font-bold leading-[40px] h-[40px] px-[22px] text-[14px] rounded-[999px] flex items-center justify-center"
            >
              Services
            </li>
            <li
              class="py-[13px] hover:bg-[#F2F0F4] duration-300 cursor-pointer text-[#333] font-bold leading-[40px] h-[40px] px-[22px] text-[14px] rounded-[999px] flex items-center justify-center"
            >
              Shop
            </li>
            <li
              class="py-[13px] hover:bg-[#F2F0F4] duration-300 cursor-pointer text-[#333] font-bold leading-[40px] h-[40px] px-[22px] text-[14px] rounded-[999px] flex items-center justify-center"
            >
              blog
            </li>
            <li
              class="py-[13px] hover:bg-[#F2F0F4] duration-300 cursor-pointer text-[#333] font-bold leading-[40px] h-[40px] px-[22px] text-[14px] rounded-[999px] flex items-center justify-center"
            >
              Contacts
            </li>
          </ul>
        </div>
        <div class="actions">
          <ul class="flex items-center">
            <li class="h-[20px] my-[10px] mx-[15px]">
              <i class="ri-search-line text-[20px]"></i>
            </li>
            <li
              class="relative inline-block cursor-pointer hover:text-white duration-300 rounded-[999px] p-[2px] bg-[linear-gradient(262deg,_#FF6B6B_14.51%,_#7352DE_95.96%)] hover:[background:linear-gradient(262deg,_#FF6B6B_14.51%,_#7352DE_95.96%)]"
            >
              <span
                class="block rounded-[999px] font-manrope bg-white hover:bg-transparent transition-colors duration-300 font-semibold min-w-[158px] px-[18px] py-[15px] text-center"
              >
                Get in touch
              </span>
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <section class="pt-[80px] bg-[#F0F2F4]">
        <div class="container max-w-[1340px] px-[40px] mx-auto">
          <div class="grid grid-cols-12 items-end">
            <div class="left col-span-8">
              <h2
                class="text-[80px] text-[#333333] leading-[1.125] font-normal tracking-[-2.4px] font-sora w-[700px]"
              >
                Harness the Power of
                <span class="text-[#62639B]">Artificial</span>
                <span class="text-[#C4515C]"> Intelligence</span>
              </h2>
            </div>
            <div class="right col-span-4">
              <p
                class="text-[16px] font-medium leading-[1.875em] font-manrope text-[#333333]"
              >
                Highlight the potential benefits of Neural Networks, such as
                improved decision-making, predictive analytics, and automation.
              </p>
              <button
                class="leading-[27px] text-[16px] hover:bg-[#E74D43] duration-300 cursor-pointer text-[#FFFFFF] py-[16px] px-[49px] rounded-[999px] font-manrope font-medium bg-[#333333] min-w-[58px] mt-[27px]"
              >
                <i class="ri-arrow-drop-right-line"></i> Discover
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
